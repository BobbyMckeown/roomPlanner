<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Room Planner</title>
        <link rel="stylesheet" href="pageStyling/style.css" />
        <script src="https://unpkg.com/konva@10/konva.min.js" defer></script>
        <script type="importmap">
            { "imports": { "three": "https://unpkg.com/three@0.164.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/" } }
        </script>
        <script src="../components/gltfPreview.js" type="module"></script>
        <script src="../components/furnitureHandler.js" defer></script>
        <script src="../components/roomDraw.js" defer></script>
        <script src="../components/sidebarPanel.js" defer></script>
        <script src="../components/roomCanvas.js" defer></script>
        <script src="../components/authModal.js" defer></script>
    </head>
    <body>
        <div id="sidebar">
            <div class="sidebar-top">
                <h2 class="sidebar-heading">ROOM LAYOUT</h2>

                <button id="btn-draw" class="btn btn-primary">Draw Room</button>
                <button id="btn-reset" class="btn btn-dark">Reset Room</button>
                <button id="btn-3d" class="btn btn-link" onclick="window.location.href='3Dscene.html'">View in 3D</button>

                <p class="hint-text">
                    Click <strong>Draw Room</strong>, then click points on
                    the canvas to trace walls. Click the starting point
                    again to finish.
                </p>

                <hr class="divider" />

                <h2 class="sidebar-heading">FURNITURE</h2>

                <div id="furniture-categories">
                    <!-- Populated by roomCanvas.js -->
                </div>
            </div>

            <div class="sidebar-bottom">
                <button id="btn-login" class="btn btn-login">Login</button>
            </div>
        </div>

        <!-- Login / Register Modal -->
        <div id="auth-overlay" class="auth-overlay hidden" style="display:none;">
            <div class="auth-modal">
                <button id="auth-close" class="auth-close">&times;</button>
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="register">Register</button>
                </div>

                <form id="login-form" class="auth-form">
                    <input type="text" id="login-username" placeholder="Username" required autocomplete="username" />
                    <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" />
                    <button type="submit" class="btn btn-primary">Login</button>
                    <p id="login-error" class="auth-error"></p>
                </form>

                <form id="register-form" class="auth-form" style="display:none;">
                    <input type="text" id="reg-username" placeholder="Username" required autocomplete="username" />
                    <input type="password" id="reg-password" placeholder="Password" required autocomplete="new-password" />
                    <input type="password" id="reg-confirm" placeholder="Confirm Password" required autocomplete="new-password" />
                    <button type="submit" class="btn btn-primary">Register</button>
                    <p id="reg-error" class="auth-error"></p>
                </form>
            </div>
        </div>

        <div id="canvas-container">
            <div id="konva-holder" aria-label="drawing area"></div>
        </div>
    </body>
</html>
