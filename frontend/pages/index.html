<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Room Planner</title>
        <link rel="stylesheet" href="pageStyling/style.css" />
        <script src="https://unpkg.com/konva@10/konva.min.js" defer></script>
        <script type="importmap">
            { "imports": { "three": "https://unpkg.com/three@0.164.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/" } }
        </script>
        <script src="../components/3Dcomponents/gltfPreview.js" type="module"></script>
        <script src="../components/2Dcomponents/furnitureHandler.js" defer></script>
        <script src="../components/2Dcomponents/roomDraw.js" defer></script>
        <script src="../components/sidebarPanel.js" defer></script>
        <script src="../components/roomStyle.js" defer></script>
        <script src="../components/2Dcomponents/roomCanvas.js" defer></script>
        <script src="../components/authModal.js" defer></script>
        <script src="../components/saveRoom.js" defer></script>
        <script src="../components/loadRoom.js" defer></script>
        <script src="../components/sketchfabCatalog.js" defer></script>
    </head>
    <body>
        <div id="sidebar">
            <div class="sidebar-top">
                <h2 class="sidebar-heading">ROOM LAYOUT</h2>

                <button id="btn-draw" class="btn btn-primary">Draw Room</button>
                <button id="btn-reset" class="btn btn-dark">Reset Room</button>
                <button id="btn-3d" class="btn btn-link" onclick="
  localStorage.setItem('roomPoints', JSON.stringify(drawPoints));
  var items = [];
  layer.find('.furniture').forEach(function(node) {
    items.push({
      x: node.x() + node.width() / 2,
      y: node.y() + node.height() / 2,
      width: node.width(),
      height: node.height(),
      modelPath: node.getAttr('modelPath')
    });
  });
  localStorage.setItem('roomFurniture', JSON.stringify(items));
  window.location.href='3Dscene.html';
">View in 3D</button>

                <p class="hint-text">
                    Click <strong>Draw Room</strong>, then click points on
                    the canvas to trace walls. Click the starting point
                    again to finish.
                </p>

                <button id="btn-load-room" class="btn btn-primary">Load Room</button>
                <button id="btn-save-room" class="btn btn-primary">Save Room</button>

                <hr class="divider" />

                <h2 class="sidebar-heading">ROOM STYLE</h2>

                <div class="style-option">
                    <label for="wall-colour">Wall Colour</label>
                    <input type="color" id="wall-colour" value="#c0c0c0" />
                </div>
                <div class="style-option">
                    <label for="floor-colour">Floor Colour</label>
                    <input type="color" id="floor-colour" value="#8b4513" />
                </div>

                <hr class="divider" />

                <h2 class="sidebar-heading">FURNITURE</h2>

                <button id="btn-sketchfab" class="btn btn-primary">Browse Sketchfab</button>

                <div id="furniture-categories">
                    <!-- Populated by roomCanvas.js -->
                </div>
            </div>

            <div class="sidebar-bottom">
                <button id="btn-login" class="btn btn-login">Login</button>
            </div>
        </div>

       
        <div id="canvas-container">
            <div id="konva-holder" aria-label="drawing area"></div>
        </div>
    </body>
</html>
